<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f6fed"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d63b32"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .part { fill: #ffffff; stroke: #111827; stroke-width: 4; }
      .hole { fill: #f8fafc; stroke: #111827; stroke-width: 4; }
      .cutout { fill: #f8fafc; stroke: #111827; stroke-width: 4; }
      .center { stroke: #d63b32; stroke-width: 2; stroke-dasharray: 10 8; }
      .dim { stroke: #2f6fed; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dimRed { stroke: #d63b32; stroke-width: 2.2; fill: none; marker-end: url(#arrowRed); }
      .note { fill: #111827; font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 24px; }
      .small { fill: #111827; font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 19px; }
      .tiny { fill: #111827; font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 16px; }
      .blue { fill: #2f6fed; }
      .red { fill: #d63b32; }
      .frame { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .datum { fill: #ffffff; stroke: #111827; stroke-width: 2.5; }
      .section { fill: #d7ecff; stroke: #111827; stroke-width: 3; }
      .hatch { stroke: #2f6fed; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>

  <text class="note" x="48" y="50">板式法兰盘形位公差标注示意</text>
  <text class="small" x="48" y="82">思路：先定贴合面 A，再用中心基准 B/C 控制孔系和轮廓。实际数值按装配精度调整。</text>

  <!-- Top view -->
  <text class="note" x="92" y="136">主视图 / 孔系控制</text>
  <rect class="part" x="110" y="185" width="360" height="360" rx="64"/>
  <rect class="cutout" x="190" y="265" width="200" height="200" rx="34"/>

  <!-- holes -->
  <circle class="hole" cx="290" cy="205" r="18"/>
  <circle class="hole" cx="290" cy="525" r="18"/>
  <circle class="hole" cx="130" cy="365" r="18"/>
  <circle class="hole" cx="450" cy="365" r="18"/>
  <circle class="hole" cx="150" cy="465" r="18"/>
  <circle class="hole" cx="430" cy="465" r="18"/>

  <!-- centerlines -->
  <line class="center" x1="290" y1="160" x2="290" y2="570"/>
  <line class="center" x1="85" y1="365" x2="495" y2="365"/>
  <text class="red tiny" x="302" y="176">B：竖向中心平面</text>
  <text class="red tiny" x="318" y="354">C：横向中心平面</text>

  <!-- datum B and C -->
  <rect class="datum" x="265" y="128" width="50" height="34"/>
  <text class="note" x="282" y="153">B</text>
  <line class="dimRed" x1="290" y1="162" x2="290" y2="190"/>

  <rect class="datum" x="508" y="348" width="50" height="34"/>
  <text class="note" x="525" y="373">C</text>
  <line class="dimRed" x1="508" y1="365" x2="470" y2="365"/>

  <!-- FCF hole position -->
  <g transform="translate(580,170)">
    <text class="note" x="0" y="0">6×孔推荐标注</text>
    <rect class="frame" x="0" y="22" width="308" height="42"/>
    <line x1="58" y1="22" x2="58" y2="64" stroke="#111827" stroke-width="2"/>
    <line x1="148" y1="22" x2="148" y2="64" stroke="#111827" stroke-width="2"/>
    <line x1="198" y1="22" x2="198" y2="64" stroke="#111827" stroke-width="2"/>
    <line x1="248" y1="22" x2="248" y2="64" stroke="#111827" stroke-width="2"/>
    <text class="small" x="16" y="50">⌖</text>
    <text class="small" x="72" y="50">φ0.15</text>
    <text class="small" x="165" y="50">A</text>
    <text class="small" x="215" y="50">B</text>
    <text class="small" x="265" y="50">C</text>
    <text class="small" x="0" y="94">含义：6 个孔的位置由 A、B、C 共同约束。</text>
    <text class="small" x="0" y="124">普通螺栓过孔可放宽到 φ0.20～φ0.30。</text>
  </g>
  <path class="dim" d="M580,240 C520,245 485,255 450,365"/>

  <!-- FCF profile cutout -->
  <g transform="translate(580,355)">
    <text class="note" x="0" y="0">内窗口 / 外形轮廓</text>
    <rect class="frame" x="0" y="22" width="294" height="42"/>
    <line x1="70" y1="22" x2="70" y2="64" stroke="#111827" stroke-width="2"/>
    <line x1="148" y1="22" x2="148" y2="64" stroke="#111827" stroke-width="2"/>
    <line x1="198" y1="22" x2="198" y2="64" stroke="#111827" stroke-width="2"/>
    <line x1="248" y1="22" x2="248" y2="64" stroke="#111827" stroke-width="2"/>
    <text class="small" x="13" y="50">轮廓度</text>
    <text class="small" x="88" y="50">0.20</text>
    <text class="small" x="165" y="50">A</text>
    <text class="small" x="215" y="50">B</text>
    <text class="small" x="265" y="50">C</text>
    <text class="small" x="0" y="94">内方孔建议 0.10～0.20；外轮廓可 0.20～0.50。</text>
  </g>
  <path class="dim" d="M580,420 C500,420 445,405 390,365"/>
  <path class="dim" d="M580,450 C520,510 490,535 470,545"/>

  <!-- Side view -->
  <text class="note" x="92" y="638">侧视 / 安装面控制</text>
  <rect class="section" x="160" y="660" width="260" height="34" rx="6"/>
  <line class="hatch" x1="172" y1="690" x2="198" y2="664"/>
  <line class="hatch" x1="205" y1="690" x2="231" y2="664"/>
  <line class="hatch" x1="238" y1="690" x2="264" y2="664"/>
  <line class="hatch" x1="271" y1="690" x2="297" y2="664"/>
  <line class="hatch" x1="304" y1="690" x2="330" y2="664"/>
  <line class="hatch" x1="337" y1="690" x2="363" y2="664"/>
  <line class="hatch" x1="370" y1="690" x2="396" y2="664"/>
  <line x1="120" y1="696" x2="470" y2="696" stroke="#d63b32" stroke-width="3"/>
  <rect class="datum" x="92" y="680" width="44" height="32"/>
  <text class="note" x="107" y="704">A</text>
  <line class="dimRed" x1="136" y1="696" x2="160" y2="696"/>

  <g transform="translate(580,620)">
    <text class="note" x="0" y="0">贴合面 A</text>
    <rect class="frame" x="0" y="22" width="154" height="42"/>
    <line x1="70" y1="22" x2="70" y2="64" stroke="#111827" stroke-width="2"/>
    <text class="small" x="13" y="50">平面度</text>
    <text class="small" x="88" y="50">0.08</text>
    <text class="small" x="0" y="94">上下面配合时，可再标：平行度 0.08 A。</text>
  </g>
  <path class="dim" d="M580,676 C520,690 480,696 420,696"/>

  <!-- Practical note -->
  <rect x="915" y="130" width="235" height="500" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text class="note" x="940" y="170">工程标注顺序</text>
  <text class="small" x="940" y="215">1. A：安装贴合面</text>
  <text class="small" x="940" y="255">2. B/C：中心面或定位边</text>
  <text class="small" x="940" y="295">3. 孔：位置度</text>
  <text class="small" x="940" y="335">4. 窗口：轮廓度</text>
  <text class="small" x="940" y="375">5. 外形：轮廓度</text>
  <text class="small" x="940" y="435">若孔只过螺栓：</text>
  <text class="small" x="940" y="470">φ0.20～φ0.30 常见</text>
  <text class="small" x="940" y="530">若孔用于定位：</text>
  <text class="small" x="940" y="565">φ0.02～φ0.05 + 铰孔</text>
</svg>
